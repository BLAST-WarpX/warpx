name: 🧴 clang sanitizers

on:
  push:
    branches:
      - "development"
  pull_request:
    paths-ignore:
      - "Docs/**"
      - "**.rst"

concurrency:
  group: ${{ github.ref }}-${{ github.head_ref }}-clangsanitizers
  cancel-in-progress: true

jobs:
  build_UB_sanitizer_single_precision:
    name: Clang UB sanitizer (SP)
    runs-on: ubuntu-24.04
    if: github.event.pull_request.draft == false
    env:
      CC: clang
      CXX: clang++
      # On CI for this test, Ninja is slower than the default:
      #CMAKE_GENERATOR: Ninja
    steps:
    - uses: actions/checkout@v4
    - name: install dependencies
      run: |
        .github/workflows/dependencies/clang.sh 17
    - name: CCache Cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ccache-${{ github.workflow }}-${{ github.job }}-git-${{ github.sha }}
        restore-keys: |
             ccache-${{ github.workflow }}-${{ github.job }}-git-
    - name: build WarpX
      run: |
        export CCACHE_COMPRESS=1
        export CCACHE_COMPRESSLEVEL=10
        export CCACHE_MAXSIZE=100M
        ccache -z

        export CXX=$(which clang++-17)
        export CC=$(which clang-17)
        export CXXFLAGS="-fsanitize=undefined,address,pointer-compare -fno-sanitize-recover=all"

        cmake -S . -B build                 \
          -GNinja                           \
          -DCMAKE_VERBOSE_MAKEFILE=ON       \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DWarpX_DIMS="RZ;1;2;3"           \
          -DWarpX_FFT=ON                    \
          -DWarpX_QED=ON                    \
          -DWarpX_QED_TABLE_GEN=ON          \
          -DWarpX_OPENPMD=ON                \
          -DWarpX_PRECISION=SINGLE          \
          -DWarpX_PARTICLE_PRECISION=SINGLE
        cmake --build build -j 4

        ccache -s
        du -hs ~/.cache/ccache

    - name: run with UB sanitizer
      run: |

        export OMP_NUM_THREADS=2

        #MPI implementations often leak memory
        export "ASAN_OPTIONS=detect_leaks=0"

        echo "=================================================================================================== "
        echo "========================  Examples/Physics_applications/laser_acceleration ======================== "
        echo "=================================================================================================== "

        mpirun -n 2 ./build/bin/warpx.rz Examples/Physics_applications/laser_acceleration/inputs_base_rz
        rm -rf ./diags
        mpirun -n 2 ./build/bin/warpx.1d Examples/Physics_applications/laser_acceleration/inputs_base_1d
        rm -rf ./diags
        mpirun -n 2 ./build/bin/warpx.2d Examples/Physics_applications/laser_acceleration/inputs_base_2d
        rm -rf ./diags
        mpirun -n 2 ./build/bin/warpx.3d Examples/Physics_applications/laser_acceleration/inputs_base_3d
        rm -rf ./diags

        echo "=================================================================================================== "
        echo "============================  Examples/Physics_applications/laser_ion ============================= "
        echo "=================================================================================================== "

        mpirun -n 2 ./build/bin/warpx.2d Examples/Physics_applications/laser_ion/inputs_test_2d_laser_ion_acc
        rm -rf ./diags

        echo "=================================================================================================== "
        echo "======================  Examples/Physics_applications/plasma_acceleration/ ======================== "
        echo "=================================================================================================== "

        cd Examples/Physics_applications/plasma_acceleration/
        mpirun -n 2 ../../../build/bin/warpx.2d inputs_test_2d_plasma_acceleration_mr
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.2d inputs_test_2d_plasma_acceleration_mr_momentum_conserving
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.2d inputs_test_2d_plasma_acceleration_boosted
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.3d inputs_test_3d_plasma_acceleration_boosted
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.3d inputs_test_3d_plasma_acceleration_boosted_hybrid
        rm -rf ./diags
        cd -

        echo "=================================================================================================== "
        echo "==========================  Examples/Physics_applications/plasma_mirror =========================== "
        echo "=================================================================================================== "

        mpirun -n 2 ./build/bin/warpx.2d Examples/Physics_applications/plasma_mirror/inputs_test_2d_plasma_mirror
        rm -rf ./diags

        echo "=================================================================================================== "
        echo "==================  Examples/Physics_applications/thomson_parabola_spectrometer =================== "
        echo "=================================================================================================== "

        mpirun -n 2 ./build/bin/warpx.3d Examples/Physics_applications/thomson_parabola_spectrometer/inputs_test_3d_thomson_parabola_spectrometer
        rm -rf ./diags

        echo "=================================================================================================== "
        echo "=========================  Examples/Physics_applications/uniform_plasma =========================== "
        echo "=================================================================================================== "

        cd Examples/Physics_applications/uniform_plasma
        mpirun -n 2 ../../../build/bin/warpx.2d inputs_test_2d_uniform_plasma
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.3d inputs_test_3d_uniform_plasma
        # not clearing diags here is intentional!
        mpirun -n 2 ../../../build/bin/warpx.3d inputs_test_3d_uniform_plasma_restart amr.restart = "./diags/chk000006"
        rm -rf ./diags
        cd -

        echo "=================================================================================================== "
        echo "==================  Examples/Physics_applications/uniform_plasma (3D, variant) ==================== "
        echo "=================================================================================================== "
        # test different algorithm settings
        cd Examples/Physics_applications/uniform_plasma
        mpirun -n 2 ../../../build/bin/warpx.3d inputs_test_3d_uniform_plasma warpx.cfl=0.98 algo.particle_shape=2
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.3d inputs_test_3d_uniform_plasma warpx.cfl=0.98 algo.particle_shape=3
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.3d inputs_test_3d_uniform_plasma warpx.cfl=0.98 algo.particle_shape=4
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.3d inputs_test_3d_uniform_plasma warpx.cfl=0.98 algo.particle_shape=4 algo.current_deposition=direct
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.3d inputs_test_3d_uniform_plasma warpx.cfl=0.98 algo.particle_shape=4 algo.field_gathering=momentum-conserving
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.3d inputs_test_3d_uniform_plasma warpx.cfl=0.98 algo.particle_shape=4 algo.particle_pusher=vay
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.3d inputs_test_3d_uniform_plasma warpx.cfl=0.98 algo.particle_shape=4 algo.particle_pusher=higuera
        rm -rf ./diags
        cd -

        echo "=================================================================================================== "
        echo "==================  Examples/Physics_applications/uniform_plasma (2D, variant) ==================== "
        echo "=================================================================================================== "
        # test different algorithm settings
        cd Examples/Physics_applications/uniform_plasma
        mpirun -n 2 ../../../build/bin/warpx.2d inputs_test_2d_uniform_plasma warpx.cfl=0.98 algo.particle_shape=2
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.2d inputs_test_2d_uniform_plasma warpx.cfl=0.98 algo.particle_shape=3
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.2d inputs_test_2d_uniform_plasma warpx.cfl=0.98 algo.particle_shape=4
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.2d inputs_test_2d_uniform_plasma warpx.cfl=0.98 algo.particle_shape=4 algo.current_deposition=direct
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.2d inputs_test_2d_uniform_plasma warpx.cfl=0.98 algo.particle_shape=4 algo.field_gathering=momentum-conserving
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.2d inputs_test_2d_uniform_plasma warpx.cfl=0.98 algo.particle_shape=4 algo.particle_pusher=vay
        rm -rf ./diags
        mpirun -n 2 ../../../build/bin/warpx.2d inputs_test_2d_uniform_plasma warpx.cfl=0.98 algo.particle_shape=4 algo.particle_pusher=higuera
        rm -rf ./diags
        cd -

  build_UB_sanitizer_double_precision:
    name: Clang UB sanitizer (DP)
    runs-on: ubuntu-24.04
    if: github.event.pull_request.draft == false
    env:
      CC: clang
      CXX: clang++
      # On CI for this test, Ninja is slower than the default:
      #CMAKE_GENERATOR: Ninja
    steps:
    - uses: actions/checkout@v4
    - name: install dependencies
      run: |
        .github/workflows/dependencies/clang.sh 17
    - name: CCache Cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ccache-${{ github.workflow }}-${{ github.job }}-git-${{ github.sha }}
        restore-keys: |
             ccache-${{ github.workflow }}-${{ github.job }}-git-
    - name: build WarpX
      run: |
        export CCACHE_COMPRESS=1
        export CCACHE_COMPRESSLEVEL=10
        export CCACHE_MAXSIZE=100M
        ccache -z

        export CXX=$(which clang++-17)
        export CC=$(which clang-17)
        export CXXFLAGS="-fsanitize=undefined,address,pointer-compare -fno-sanitize-recover=all"

        cmake -S . -B build                 \
          -GNinja                           \
          -DCMAKE_VERBOSE_MAKEFILE=ON       \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DWarpX_DIMS="1;2;3"           \
          -DWarpX_FFT=ON                    \
          -DWarpX_QED=ON                    \
          -DWarpX_QED_TABLE_GEN=ON          \
          -DWarpX_OPENPMD=ON                \
          -DWarpX_PRECISION=DOUBLE          \
          -DWarpX_PARTICLE_PRECISION=DOUBLE
        cmake --build build -j 4

        ccache -s
        du -hs ~/.cache/ccache

    - name: run with UB sanitizer
      run: |

        export OMP_NUM_THREADS=2

        #MPI implementations often leak memory
        export "ASAN_OPTIONS=detect_leaks=0"

        echo "=================================================================================================== "
        echo "=======================  Examples/Physics_applications/beam_beam_collision ======================== "
        echo "=================================================================================================== "

        mpirun -n 2 ./build/bin/warpx.3d Examples/Physics_applications/beam_beam_collision/inputs_test_3d_beam_beam_collision
        rm -rf ./diags

        echo "=================================================================================================== "
        echo "=======================  Examples/Physics_applications/capacitive_discharge ======================= "
        echo "=================================================================================================== "

        git clone https://github.com/ECP-WarpX/warpx-data ../warpx-data
        cd Examples/Physics_applications/capacitive_discharge
        mpirun -n 2 ../../../build/bin/warpx.2d inputs_test_2d_background_mcc
        rm -rf ./diags
        cd -

        echo "=================================================================================================== "
        echo "=======================  Examples/Physics_applications/free_electron_laser ======================== "
        echo "=================================================================================================== "

        mpirun -n 2 ./build/bin/warpx.1d Examples/Physics_applications/free_electron_laser/inputs_test_1d_fel
        rm -rf ./diags

  build_thread_sanitizer:
    name: Clang thread sanitizer
    runs-on: ubuntu-24.04
    # TODO Fix data race conditions and re-enable job
    if: 0 #github.event.pull_request.draft == false
    env:
      CC: clang
      CXX: clang++
      # On CI for this test, Ninja is slower than the default:
      #CMAKE_GENERATOR: Ninja
    steps:
    - uses: actions/checkout@v4
    - name: install dependencies
      run: |
        .github/workflows/dependencies/clang.sh 17
    - name: CCache Cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ccache-${{ github.workflow }}-${{ github.job }}-git-${{ github.sha }}
        restore-keys: |
             ccache-${{ github.workflow }}-${{ github.job }}-git-
    - name: build WarpX
      run: |
        export CCACHE_COMPRESS=1
        export CCACHE_COMPRESSLEVEL=10
        export CCACHE_MAXSIZE=100M
        ccache -z

        export CXX=$(which clang++-17)
        export CC=$(which clang-17)
        export CXXFLAGS="-fsanitize=thread"

        cmake -S . -B build                 \
          -GNinja                           \
          -DCMAKE_VERBOSE_MAKEFILE=ON       \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DWarpX_DIMS="RZ;1;2;3"           \
          -DWarpX_FFT=ON                    \
          -DWarpX_QED=ON                    \
          -DWarpX_QED_TABLE_GEN=ON          \
          -DWarpX_OPENPMD=ON                \
          -DWarpX_EB=OFF                    \
          -DWarpX_PRECISION=DOUBLE          \
          -DWarpX_PARTICLE_PRECISION=DOUBLE
        cmake --build build -j 4

        cmake -S . -B build_EB              \
          -GNinja                           \
          -DCMAKE_VERBOSE_MAKEFILE=ON       \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DWarpX_DIMS="2"                  \
          -DWarpX_FFT=ON                    \
          -DWarpX_QED=ON                    \
          -DWarpX_QED_TABLE_GEN=ON          \
          -DWarpX_OPENPMD=ON                \
          -DWarpX_EB=ON                     \
          -DWarpX_PRECISION=DOUBLE          \
          -DWarpX_PARTICLE_PRECISION=DOUBLE
        cmake --build build_EB -j 4

        ccache -s
        du -hs ~/.cache/ccache

    - name: run with thread sanitizer
      run: |
        export PMIX_MCA_gds=hash
        export TSAN_OPTIONS='ignore_noninstrumented_modules=1'
        export ARCHER_OPTIONS="verbose=1"

        export OMP_NUM_THREADS=2

        mpirun -n 2 ./build/bin/warpx.rz Examples/Physics_applications/laser_acceleration/inputs_base_rz warpx.serialize_initial_conditions = 0
        mpirun -n 2 ./build/bin/warpx.1d Examples/Physics_applications/laser_acceleration/inputs_base_1d warpx.serialize_initial_conditions = 0
        mpirun -n 2 ./build/bin/warpx.2d Examples/Physics_applications/laser_acceleration/inputs_base_2d warpx.serialize_initial_conditions = 0
        mpirun -n 2 ./build/bin/warpx.3d Examples/Physics_applications/laser_acceleration/inputs_base_3d warpx.serialize_initial_conditions = 0

        git clone https://github.com/ECP-WarpX/warpx-data ../warpx-data
        cd Examples/Tests/embedded_circle

        ulimit -c unlimited

        mpirun -n 2 ../../../build_EB/bin/warpx.2d inputs_test_2d_embedded_circle warpx.serialize_initial_conditions = 0
