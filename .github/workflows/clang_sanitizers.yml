          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DWarpX_DIMS="3"                  \
          -DWarpX_FFT=ON                    \
          -DWarpX_QED=ON                    \
          -DWarpX_QED_TABLE_GEN=ON          \
          -DWarpX_OPENPMD=ON                \
