name: 🧴 Clang sanitizers

on:
  push:
    branches:
      - "development"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.ref }}-${{ github.head_ref }}-clangsanitizers
  cancel-in-progress: true

jobs:

  check_changes:
    name: Analyze
    uses: ./.github/workflows/check_changes.yml

  ub_sanitizer_1D:
    name: UB sanitizer 1D
    runs-on: ubuntu-24.04
    needs: check_changes
    if: ${{ github.event.pull_request.draft == false && needs.check_changes.outputs.has_non_docs_changes == 'true' }}
    env:
      CC: clang
      CXX: clang++
    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies
      run: |
        .github/workflows/dependencies/clang.sh 19
    - name: CCache Cache
      uses: actions/cache@v6
      with:
        path: ~/.cache/ccache
        key: ccache-${{ github.workflow }}-${{ github.job }}-git-${{ github.sha }}
        restore-keys: |
             ccache-${{ github.workflow }}-${{ github.job }}-git-
    - name: Build WarpX
      run: |
        export CCACHE_COMPRESS=1
        export CCACHE_COMPRESSLEVEL=10
        export CCACHE_MAXSIZE=300M
        ccache -z
        export CXX=$(which clang++-19)
        export CC=$(which clang-19)
        export CXXFLAGS="-fsanitize=undefined,address,pointer-compare -fno-sanitize-recover=all"
        cmake -S . -B build                 \
          -GNinja                           \
          -DCMAKE_VERBOSE_MAKEFILE=ON       \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DWarpX_DIMS="1"                  \
          -DWarpX_FFT=ON                    \
          -DWarpX_QED=ON                    \
          -DWarpX_QED_TABLE_GEN=ON          \
          -DWarpX_OPENPMD=ON
        cmake --build build -j 4
        ccache -s
        du -hs ~/.cache/ccache
    - name: Run WarpX with UB sanitizer
      run: |
        export OMP_NUM_THREADS=2
        #MPI implementations often leak memory
        export "ASAN_OPTIONS=detect_leaks=0"
        # Print stacktrace for easier debugging
        export UBSAN_OPTIONS=print_stacktrace=1
        git clone https://github.com/ECP-WarpX/warpx-data ../warpx-data
        ctest --test-dir build/Examples/Physics_applications/ -R ".*\.run" --output-on-failure

  ub_sanitizer_2D_RZ:
    name: UB sanitizer 2D, RZ
    runs-on: ubuntu-24.04
    needs: check_changes
    if: ${{ github.event.pull_request.draft == false && needs.check_changes.outputs.has_non_docs_changes == 'true' }}
    env:
      CC: clang
      CXX: clang++
    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies
      run: |
        .github/workflows/dependencies/clang.sh 19
    - name: CCache Cache
      uses: actions/cache@v6
      with:
        path: ~/.cache/ccache
        key: ccache-${{ github.workflow }}-${{ github.job }}-git-${{ github.sha }}
        restore-keys: |
             ccache-${{ github.workflow }}-${{ github.job }}-git-
    - name: Build WarpX
      run: |
        export CCACHE_COMPRESS=1
        export CCACHE_COMPRESSLEVEL=10
        export CCACHE_MAXSIZE=300M
        ccache -z
        export CXX=$(which clang++-19)
        export CC=$(which clang-19)
        export CXXFLAGS="-fsanitize=undefined,address,pointer-compare -fno-sanitize-recover=all"
        cmake -S . -B build                 \
          -GNinja                           \
          -DCMAKE_VERBOSE_MAKEFILE=ON       \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DWarpX_DIMS="2;RZ"               \
          -DWarpX_FFT=ON                    \
          -DWarpX_QED=ON                    \
          -DWarpX_QED_TABLE_GEN=ON          \
          -DWarpX_OPENPMD=ON
        cmake --build build -j 4
        ccache -s
        du -hs ~/.cache/ccache
    - name: Run WarpX with UB sanitizer
      run: |
        export OMP_NUM_THREADS=2
        #MPI implementations often leak memory
        export "ASAN_OPTIONS=detect_leaks=0"
        # Print stacktrace for easier debugging
        export UBSAN_OPTIONS=print_stacktrace=1
        git clone https://github.com/ECP-WarpX/warpx-data ../warpx-data
        ctest --test-dir build/Examples/Physics_applications/ -R ".*\.run" --output-on-failure

  ub_sanitizer_3D:
    name: UB sanitizer 3D
    runs-on: ubuntu-24.04
    needs: check_changes
    if: ${{ github.event.pull_request.draft == false && needs.check_changes.outputs.has_non_docs_changes == 'true' }}
    env:
      CC: clang
      CXX: clang++
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        .github/workflows/dependencies/clang.sh 19
    - name: CCache Cache
      uses: actions/cache@v6
      with:
